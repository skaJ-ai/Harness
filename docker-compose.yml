services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      ADMIN_LOGIN_ID: ${ADMIN_LOGIN_ID:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      DATABASE_URL: ${DATABASE_URL:-postgresql://harp:harp@db:5432/harp}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      LLM_API_URL: ${LLM_API_URL:-http://10.240.248.157:8533/v1}
      LLM_MODEL: ${LLM_MODEL:-Qwen/Qwen3-235B-A22B}
      NODE_ENV: production
    ports:
      - "26000:3000"
    restart: unless-stopped

  db:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-harp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-harp}
      POSTGRES_USER: ${POSTGRES_USER:-harp}
    healthcheck:
      interval: 5s
      retries: 10
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-harp} -d ${POSTGRES_DB:-harp}"]
      timeout: 5s
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
